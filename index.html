<!DOCTYPE html>
<html lang="th">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ระบบลงทะเบียนนักศึกษา</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
        
        <style>
            body {
                font-family: 'Kanit', sans-serif;
            }
        </style>

    </head>

    <body class="bg-gray-100">

        <nav class="sticky top-0 z-50 bg-white shadow-md p-4 mb-10">

            <div class="container mx-auto flex justify-between items-center">

                <div class="text-2xl font-bold text-blue-600">
                    Regis<span class="text-gray-800">App</span>
                </div>

                <button class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    ลงทะเบียน
                </button>

            </div>

        </nav>

        <div class="container mx-auto px-4 flex justify-center">

            <div id="registration-container" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
                
                <div id="form-content">

                    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">แบบฟอร์มลงทะเบียนนักศึกษา</h2>
                    
                    <form id="student-form" class="space-y-4">

                        <div>
                            <label class="block text-gray-700">ชื่อ-นามสกุล</label>
                            <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                            <div>
                                <label class="block text-gray-700">รหัสนักศึกษา</label>
                                <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>

                            <div>
                                <label class="block text-gray-700">คณะ/สาขา</label>
                                <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>

                        </div>

                        <div>

                            <label class="block text-gray-700">อีเมล</label>
                            <input type="email" required class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        
                        </div>

                        <div>

                            <label class="block text-gray-700">เบอร์โทรศัพท์</label>
                            <input type="tel" class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white font-medium py-3 rounded-lg mt-6 hover:bg-blue-700 transition duration-300">
                            ยืนยันการลงทะเบียน
                        </button>

                    </form>

                </div>

                <div id="success-message" class="hidden text-center py-10">

                    <h2 class="text-3xl font-bold text-gray-800">ลงทะเบียนสำเร็จ</h2>
                    <p class="text-gray-600">ข้อมูลของคุณถูกบันทึกเข้าสู่ระบบเรียบร้อยแล้ว</p>
                    <button onclick="location.reload()" class="mt-6 text-blue-600 hover:underline">ลงทะเบียนเพิ่ม</button>
                
                </div>
                
            </div>

        </div>

    </body>

    <script>

        const form = document.getElementById('student-form');
        const formContent = document.getElementById('form-content');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            formContent.classList.add('hidden');
            successMessage.classList.remove('hidden');
        });

    </script>
    
</html>
